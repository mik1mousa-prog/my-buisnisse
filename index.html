<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>شراء العضلات 💪</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    text-align: center;
    color: white;

    /* خلفية الصورة */
    background-image: url("image.jpg");
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
}

.container {
    background: rgba(0,0,0,0.6);
    height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
}

button {
    padding: 20px 30px;
    font-size: 20px;
    background: #38bdf8;
    border: none;
    border-radius: 10px;
    cursor: pointer;
}

button:hover {
    background: #0ea5e9;
}

.message {
    margin-top: 20px;
    font-size: 20px;
    display: none;
}
</style>

</head>

<body>

<div class="container">

<h1>💪 متجر العضلات</h1>

<button onclick="showError()">اضغط هنا لشراء العضلات</button>

<div id="msg" class="message">
error ❌<br>
خصك صوارد خويا كي يكونو عندك صوارك اك تشري يا نحيف🥀
</div>

<audio id="sound">
  <source src="sound.mp3" type="audio/mpeg">
</audio>

</div>

<script>
function showError() {
    let msg = document.getElementById("msg");
    msg.style.display = "block";

    setTimeout(function() {
        let audio = document.getElementById("sound");
        audio.volume = 1.0; // صوت عالي
        audio.play();
    }, 5000); // بعد 2 ثواني
}
</script>

</body>
</html>
