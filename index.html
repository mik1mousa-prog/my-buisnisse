<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>موقعي</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: linear-gradient(135deg, #0f172a, #1e293b);
    color: white;
    text-align: center;
}

.container {
    padding: 30px;
}

h1 {
    font-size: 40px;
    color: #38bdf8;
}

img {
    width: 90%;
    max-width: 350px;
    border-radius: 20px;
    margin-top: 20px;
}

button {
    margin-top: 25px;
    padding: 15px 30px;
    font-size: 20px;
    background: #38bdf8;
    border: none;
    border-radius: 12px;
    cursor: pointer;
}

button:hover {
    background: #0ea5e9;
}

.footer {
    margin-top: 50px;
    font-size: 18px;
    opacity: 0.8;
}
</style>
</head>

<body>

<div class="container">

<h1>مرحبا 👋</h1>

<!-- الصورة -->
<img src="https://files.catbox.moe/3b3t9u.jpg" alt="صورتي">

<br>

<!-- زر الصوت -->
<button onclick="playSound()">🔊 اضغط للصوت</button>

<!-- الصوت -->
<audio id="sound">
  <source src="https://www.myinstants.com/media/sounds/go-go-gaga.mp3" type="audio/mpeg">
</audio>

<!-- الجملة -->
<div class="footer">
    الهدرة مواقع
</div>

</div>

<script>
function playSound() {
    document.getElementById("sound").play();
}
</script>

</body>
</html>
