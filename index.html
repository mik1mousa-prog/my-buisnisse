<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>لعبة الدودة 🐍</title>

<style>
body {
    margin: 0;
    text-align: center;
    color: white;
    font-family: Arial;
    background-image: url("https://picsum.photos/800/600");
    background-size: cover;
}

canvas {
    background: rgba(0,0,0,0.7);
    margin-top: 20px;
}

button {
    width: 70px;
    height: 70px;
    font-size: 25px;
    margin: 5px;
}
</style>
</head>

<body>

<h1>🐍 لعبة الدودة</h1>
<p>Score: <span id="score">0</span></p>

<canvas id="game" width="300" height="300"></canvas>

<div>
<br>
<button onclick="setDir('up')">⬆️</button><br>
<button onclick="setDir('left')">⬅️</button>
<button onclick="setDir('down')">⬇️</button>
<button onclick="setDir('right')">➡️</button>
</div>

<audio id="eatSound">
<source src="https://www.soundjay.com/button/sounds/button-3.mp3">
</audio>

<script>
let canvas = document.getElementById("game");
let ctx = canvas.getContext("2d");

let snake, food, dir, score;

// 🔥 دالة إعادة اللعبة
function resetGame(){
    snake = [{x:150,y:150}];
    food = {
        x: Math.floor(Math.random()*30)*10,
        y: Math.floor(Math.random()*30)*10
    };
    dir = "right";
    score = 0;
    document.getElementById("score").innerText = score;
}

// أول تشغيل
resetGame();

function draw() {
    ctx.clearRect(0,0,300,300);

    ctx.fillStyle = "lime";
    snake.forEach(p => ctx.fillRect(p.x,p.y,10,10));

    ctx.fillStyle = "brown";
    ctx.fillRect(food.x, food.y, 10, 10);

    move();
}

function move() {
    let head = {x: snake[0].x, y: snake[0].y};

    if(dir==="right") head.x+=10;
    if(dir==="left") head.x-=10;
    if(dir==="up") head.y-=10;
    if(dir==="down") head.y+=10;

    // 💀 موت = إعادة مباشرة
    if(head.x<0 || head.y<0 || head.x>=300 || head.y>=300){
        resetGame();
        return;
    }

    for(let i=0;i<snake.length;i++){
        if(head.x===snake[i].x && head.y===snake[i].y){
            resetGame();
            return;
        }
    }

    snake.unshift(head);

    if(head.x===food.x && head.y===food.y){
        score++;
        document.getElementById("score").innerText = score;
        document.getElementById("eatSound").play();

        food.x = Math.floor(Math.random()*30)*10;
        food.y = Math.floor(Math.random()*30)*10;
    } else {
        snake.pop();
    }
}

function setDir(d){
    dir = d;
}

document.addEventListener("keydown", e=>{
    if(e.key==="ArrowUp") dir="up";
    if(e.key==="ArrowDown") dir="down";
    if(e.key==="ArrowLeft") dir="left";
    if(e.key==="ArrowRight") dir="right";
});

setInterval(draw, 100);
</script>

</body>
</html>
