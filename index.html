<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>🐍 Snake Ultra Smooth</title>

<style>
body {
    margin: 0;
    text-align: center;
    color: white;
    font-family: Arial;
    background: linear-gradient(#0f172a, #1e293b);
}

canvas {
    background: rgba(0,0,0,0.8);
    margin-top: 20px;
    border-radius: 10px;
}

button {
    width: 70px;
    height: 70px;
    font-size: 25px;
    margin: 5px;
}
</style>
</head>

<body>

<h1>🐍 Ultra Snake</h1>
<p>Score: <span id="score">0</span></p>

<canvas id="game" width="300" height="300"></canvas>

<div>
<br>
<button onclick="setDir('up')">⬆️</button><br>
<button onclick="setDir('left')">⬅️</button>
<button onclick="setDir('down')">⬇️</button>
<button onclick="setDir('right')">➡️</button>
</div>

<audio id="eatSound">
<source src="https://www.soundjay.com/button/sounds/button-3.mp3">
</audio>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

let snake, food, dir, score;
let grid = 10;

// إعادة اللعبة
function resetGame(){
    snake = [{x:150,y:150}];
    food = randomFood();
    dir = "right";
    score = 0;
    document.getElementById("score").innerText = score;
}

function randomFood(){
    return {
        x: Math.floor(Math.random()*30)*grid,
        y: Math.floor(Math.random()*30)*grid
    };
}

resetGame();

// رسم ناعم
function draw(){
    ctx.clearRect(0,0,300,300);

    // الدودة
    ctx.fillStyle = "#22c55e";
    snake.forEach((p,i)=>{
        ctx.globalAlpha = 1 - i*0.03;
        ctx.fillRect(p.x,p.y,grid,grid);
    });
    ctx.globalAlpha = 1;

    // الأكل
    ctx.fillStyle = "orange";
    ctx.beginPath();
    ctx.arc(food.x+5, food.y+5, 5, 0, Math.PI*2);
    ctx.fill();
}

// تحديث
function update(){
    let head = {x: snake[0].x, y: snake[0].y};

    if(dir==="right") head.x+=grid;
    if(dir==="left") head.x-=grid;
    if(dir==="up") head.y-=grid;
    if(dir==="down") head.y+=grid;

    // موت
    if(head.x<0 || head.y<0 || head.x>=300 || head.y>=300){
        resetGame();
        return;
    }

    for(let i=0;i<snake.length;i++){
        if(head.x===snake[i].x && head.y===snake[i].y){
            resetGame();
            return;
        }
    }

    snake.unshift(head);

    if(head.x===food.x && head.y===food.y){
        score++;
        document.getElementById("score").innerText = score;

        document.getElementById("eatSound").currentTime = 0;
        document.getElementById("eatSound").play();

        food = randomFood();
    } else {
        snake.pop();
    }
}

// 🔥 السرعة تتغير حسب السكور
function getSpeed(){
    return Math.max(60, 120 - score*3);
}

let lastTime = 0;

function gameLoop(time){
    if(time - lastTime > getSpeed()){
        update();
        lastTime = time;
    }

    draw();
    requestAnimationFrame(gameLoop);
}

requestAnimationFrame(gameLoop);

// تحكم
function setDir(d){
    dir = d;
}

document.addEventListener("keydown", e=>{
    if(e.key==="ArrowUp") dir="up";
    if(e.key==="ArrowDown") dir="down";
    if(e.key==="ArrowLeft") dir="left";
    if(e.key==="ArrowRight") dir="right";
});
</script>

</body>
</html>
