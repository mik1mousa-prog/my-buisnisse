<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>موقعي</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: linear-gradient(135deg, #0f172a, #1e293b);
    color: white;
    text-align: center;
}

.container {
    padding: 30px;
}

h1 {
    font-size: 45px;
    color: #38bdf8;
}

p {
    font-size: 22px;
}

img {
    width: 90%;
    max-width: 350px;
    border-radius: 20px;
    margin-top: 20px;
}

button {
    margin-top: 25px;
    padding: 15px 30px;
    font-size: 20px;
    background: #38bdf8;
    border: none;
    border-radius: 12px;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    background: #0ea5e9;
}

footer {
    margin-top: 40px;
    font-size: 14px;
    opacity: 0.7;
}
</style>
</head>

<body>

<div class="container">

<h1>مرحبا 👋</h1>
<p>هذا موقعي الجديد 🔥</p>

<img src="https://picsum.photos/400" alt="صورة">

<br>

<button onclick="playSound()">🔊 اضغط للصوت</button>

<audio id="sound">
  <source src="https://www.soundjay.com/buttons/sounds/button-3.mp3">
</audio>

<footer>
    تم إنشاء الموقع بواسطة 💻
</footer>

</div>

<script>
function playSound() {
    document.getElementById("sound").play();
}
</script>

</body>
</html>
