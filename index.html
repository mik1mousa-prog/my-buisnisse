<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>🐍 Snake Scare</title>

<style>
body {
    margin: 0;
    text-align: center;
    color: white;
    font-family: Arial;
    background: black;
}

canvas {
    background: rgba(0,0,0,0.8);
    margin-top: 20px;
}

button {
    width: 70px;
    height: 70px;
    font-size: 25px;
    margin: 5px;
}

/* شاشة المفاجأة */
#scare {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    display: none;
    background: black;
    justify-content: center;
    align-items: center;
    flex-direction: column;
    z-index: 999;
}

#scare img {
    width: 100%;
    height: 100%;
    object-fit: cover;
}

#text {
    position: absolute;
    bottom: 20px;
    font-size: 22px;
    color: red;
}
</style>
</head>

<body>

<h1>🐍 Snake</h1>
<p>Score: <span id="score">0</span></p>

<canvas id="game" width="300" height="300"></canvas>

<div>
<br>
<button onclick="setDir('up')">⬆️</button><br>
<button onclick="setDir('left')">⬅️</button>
<button onclick="setDir('down')">⬇️</button>
<button onclick="setDir('right')">➡️</button>
</div>

<!-- المفاجأة -->
<div id="scare">
    <img src="scare.jpg">
    <div id="text">ماتعرفش تلعب اخي الكريم ماتلعبش</div>
</div>

<audio id="eatSound">
<source src="https://www.soundjay.com/button/sounds/button-3.mp3">
</audio>

<audio id="scream">
<source src="scream.mp3">
</audio>

<script>
let canvas = document.getElementById("game");
let ctx = canvas.getContext("2d");

let snake, food, dir, score;
let loseCount = 0; // عدد الخسارات
let grid = 10;

function resetGame(){
    snake = [{x:150,y:150}];
    food = {
        x: Math.floor(Math.random()*30)*grid,
        y: Math.floor(Math.random()*30)*grid
    };
    dir = "right";
    score = 0;
    document.getElementById("score").innerText = score;
}

resetGame();

function draw(){
    ctx.clearRect(0,0,300,300);

    ctx.fillStyle = "lime";
    snake.forEach(p => ctx.fillRect(p.x,p.y,grid,grid));

    ctx.fillStyle = "orange";
    ctx.fillRect(food.x, food.y, grid, grid);
}

function gameOver(){
    loseCount++;

    if(loseCount >= 2){
        showScare();
        loseCount = 0;
    }

    resetGame();
}

function showScare(){
    let scare = document.getElementById("scare");
    let sound = document.getElementById("scream");

    scare.style.display = "flex";

    sound.volume = 1.0;
    sound.currentTime = 0;
    sound.play();

    setTimeout(()=>{
        scare.style.display = "none";
    }, 3000); // تختفي بعد 3 ثواني
}

function update(){
    let head = {x: snake[0].x, y: snake[0].y};

    if(dir==="right") head.x+=grid;
    if(dir==="left") head.x-=grid;
    if(dir==="up") head.y-=grid;
    if(dir==="down") head.y+=grid;

    if(head.x<0 || head.y<0 || head.x>=300 || head.y>=300){
        gameOver();
        return;
    }

    for(let i=0;i<snake.length;i++){
        if(head.x===snake[i].x && head.y===snake[i].y){
            gameOver();
            return;
        }
    }

    snake.unshift(head);

    if(head.x===food.x && head.y===food.y){
        score++;
        document.getElementById("score").innerText = score;

        document.getElementById("eatSound").play();

        food.x = Math.floor(Math.random()*30)*grid;
        food.y = Math.floor(Math.random()*30)*grid;
    } else {
        snake.pop();
    }
}

let lastTime = 0;

function gameLoop(time){
    if(time - lastTime > 120){
        update();
        lastTime = time;
    }
    draw();
    requestAnimationFrame(gameLoop);
}

requestAnimationFrame(gameLoop);

function setDir(d){
    dir = d;
}

document.addEventListener("keydown", e=>{
    if(e.key==="ArrowUp") dir="up";
    if(e.key==="ArrowDown") dir="down";
    if(e.key==="ArrowLeft") dir="left";
    if(e.key==="ArrowRight") dir="right";
});
</script>

</body>
</html>
