<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>موقعي</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: linear-gradient(135deg, #0f172a, #1e293b);
    color: white;
    text-align: center;
}

.container {
    padding: 30px;
}

h1 {
    font-size: 40px;
    color: #38bdf8;
}

img {
    width: 90%;
    max-width: 300px;
    border-radius: 15px;
    margin-top: 20px;
}

button {
    margin-top: 25px;
    padding: 15px 25px;
    font-size: 18px;
    background-color: #38bdf8;
    border: none;
    border-radius: 10px;
    cursor: pointer;
}

.footer {
    margin-top: 40px;
    font-size: 18px;
}
</style>

</head>

<body>

<div class="container">

<h1>مرحبا 👋</h1>
<p>هذا موقعي المطور</p>

<!-- صورة شغالة 100% -->
<img src="https://picsum.photos/300" alt="صورة">

<br>

<button onclick="playSound()">اضغط لتشغيل الصوت</button>

<!-- صوت مضمون -->
<audio id="sound">
  <source src="https://www.soundjay.com/button/sounds/button-3.mp3" type="audio/mpeg">
</audio>

<div class="footer">
الهدرة مواقع
</div>

</div>

<script>
function playSound() {
    let audio = document.getElementById("sound");
    audio.play().catch(function(e){
        alert("اضغط مرة ثانية لتشغيل الصوت 🔊");
    });
}
</script>

</body>
</html>
